services:
  - type: web
    name: talentscout-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: talentscout-db
          property: connectionString
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_PORT
        value: 6333
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: talentscout-db
    databaseName: talentscout
    user: postgres
    plan: free